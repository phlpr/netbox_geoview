name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

  build:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate tag matches package version
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          tag = "${{ github.ref_name }}"
          text = Path("netbox_geoview/version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not read __version__ from netbox_geoview/version.py")
          version = match.group(1)
          expected_tag = f"v{version}"
          if tag != expected_tag:
              raise SystemExit(
                  f"Tag/version mismatch: got tag '{tag}', expected '{expected_tag}' from __version__"
              )
          print(f"Release tag validated: {tag} matches __version__={version}")
          PY

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/netbox-geoview

    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
